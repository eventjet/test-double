name: CI

on:
  pull_request:
  push:
    branches: [master]

jobs:
  deps:
    name: Dependency Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: soap
      - uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.json') }}
          restore-keys: ${{ runner.os }}-composer-
      - run: composer install --prefer-dist --no-progress
      - run: composer check-deps

  cs:
    name: Code Style
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: soap
      - uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.json') }}
          restore-keys: ${{ runner.os }}-composer-
      - run: composer install --prefer-dist --no-progress
      - run: composer cs-check

  psalm:
    name: Psalm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: soap
      - uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.json') }}
          restore-keys: ${{ runner.os }}-composer-
      - run: composer install --prefer-dist --no-progress
      - run: composer psalm

  phpstan:
    name: PHPStan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: soap
      - uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.json') }}
          restore-keys: ${{ runner.os }}-composer-
      - run: composer install --prefer-dist --no-progress
      - run: composer phpstan

  tests:
    name: Tests (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: ['8.3', '8.4', '8.5']
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: soap, pcov
          coverage: pcov
      - uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-php${{ matrix.php }}-composer-${{ hashFiles('composer.json') }}
          restore-keys: ${{ runner.os }}-php${{ matrix.php }}-composer-
      - run: composer install --prefer-dist --no-progress
      - name: Run tests
        run: composer phpunit
        if: matrix.php != '8.3'
      - name: Run tests with coverage
        run: composer phpunit -- --coverage-xml=coverage --log-junit=coverage/junit.xml
        if: matrix.php == '8.3'
      - uses: actions/upload-artifact@v7
        if: matrix.php == '8.3'
        with:
          name: coverage
          path: coverage/

  mutation:
    name: Mutation Testing
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: soap
      - uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-php8.3-composer-${{ hashFiles('composer.json') }}
          restore-keys: ${{ runner.os }}-php8.3-composer-
      - run: composer install --prefer-dist --no-progress
      - uses: actions/download-artifact@v4
        with:
          name: coverage
          path: coverage/
      - run: composer infection -- --coverage=coverage --skip-initial-tests
